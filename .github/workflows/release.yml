name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # Matches semver tags like 0.1.0, 1.0.0, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (semver format, e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-release:
    name: Test Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.95.0]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Test build with portable features (non-Windows)
      if: runner.os != 'Windows'
      run: cargo build --release --features fastembed,huggingface

    - name: Test build with no default features
      run: cargo build --release --no-default-features

    - name: Run tests (portable features, non-Windows)
      if: runner.os != 'Windows'
      run: cargo test --release --features fastembed,huggingface

    - name: Run tests (no default features, Windows)
      if: runner.os == 'Windows'
      run: cargo test --release --no-default-features

  publish-crate:
    name: Publish to Crates.io
    needs: test-release
    uses: muvon/ci-workflow/.github/workflows/rust-publish.yml@master
    secrets: inherit
    with:
      tag: ${{ inputs.tag }}
      publish-flags: '--features fastembed,huggingface'

  release:
    name: Create Release
    needs: publish-crate
    uses: muvon/ci-workflow/.github/workflows/release.yml@master
    with:
      tag: ${{ inputs.tag }}
      draft: false
