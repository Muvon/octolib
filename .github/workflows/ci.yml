name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  rust:
    name: Rust CI
    uses: muvon/ci-workflow/.github/workflows/rust-ci.yml@master
    with:
      feature-flags: '--features fastembed,huggingface'
      test-script: |
        cargo test --verbose --lib --no-default-features
        if [ "$RUNNER_OS" != "Windows" ]; then
          cargo test --verbose --lib --features fastembed,huggingface
          cargo test --verbose --lib --no-default-features --features fastembed
          cargo test --verbose --lib --no-default-features --features huggingface
        fi
      tarpaulin-args: '--verbose --no-default-features --timeout 120 --out xml'

  brief:
    uses: muvon/ci-workflow/.github/workflows/brief.yml@master
    secrets: inherit
