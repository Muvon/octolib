name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'  # Matches semver tags like 0.1.0, 1.0.0, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (semver format, e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-release:
    name: Test Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.95.0]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Test build with portable features (non-Windows)
      if: runner.os != 'Windows'
      run: cargo build --release --features fastembed,huggingface

    - name: Test build with no default features
      run: cargo build --release --no-default-features

    - name: Run tests (portable features, non-Windows)
      if: runner.os != 'Windows'
      run: cargo test --release --features fastembed,huggingface

    - name: Run tests (no default features, Windows)
      if: runner.os == 'Windows'
      run: cargo test --release --no-default-features

  publish-crate:
    name: Publish to Crates.io
    needs: test-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-publish-
          ${{ runner.os }}-cargo-

    - name: Validate version matches tag
      run: |
        VERSION="${{ inputs.tag || github.ref_name }}"
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

        if [ "$VERSION" != "$CARGO_VERSION" ]; then
          echo "❌ Version mismatch!"
          echo "Git tag: $VERSION"
          echo "Cargo.toml: $CARGO_VERSION"
          echo "Please update Cargo.toml version to match the git tag"
          exit 1
        fi

        echo "✅ Version validation passed: $VERSION"

    - name: Check if version already published
      id: check_published
      run: |
        VERSION="${{ inputs.tag || github.ref_name }}"

        # Check if this version already exists on crates.io
        if cargo search octolib --limit 1 | grep -q "octolib = \"$VERSION\""; then
          echo "already_published=true" >> $GITHUB_OUTPUT
          echo "⚠️  Version $VERSION already published to crates.io"
        else
          echo "already_published=false" >> $GITHUB_OUTPUT
          echo "✅ Version $VERSION not yet published"
        fi

    - name: Dry run publish
      if: steps.check_published.outputs.already_published == 'false'
      run: |
        echo "🔍 Running dry-run publish to validate package..."
        cargo publish --dry-run --features fastembed,huggingface
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: Publish to crates.io
      if: steps.check_published.outputs.already_published == 'false'
      run: |
        echo "🚀 Publishing to crates.io..."
        cargo publish --features fastembed,huggingface
        echo "✅ Successfully published to crates.io!"
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: Skip publishing
      if: steps.check_published.outputs.already_published == 'true'
      run: |
        echo "⏭️  Skipping crates.io publish - version already exists"

  release:
    name: Create Release
    needs: publish-crate
    uses: muvon/ci-workflow/.github/workflows/release.yml@master
    with:
      tag: ${{ inputs.tag }}
      draft: false
